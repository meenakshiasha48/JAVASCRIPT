<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
   function comment (comment) {
    let digitpattern = /\d+/g;
    let  hasNumbers = digitpattern.test(comment);
    let newcomment = comment.replace(digitpattern, "NUMBER");
   
    return {
        hasNumbers: hasNumbers,
        newcomment: newcomment
    };
}   
  
 

let  testcomment = "My son is 12 years old. Our flat number is 45 and contact is 9876543210.";
let  result = comment(testcomment);
console.log("Original Comment:", testcomment);

console.log("Number Found:", result.hasNumbers);
console.log("New Comment:", result.newcomment);

    </script>
</body>
</html>
